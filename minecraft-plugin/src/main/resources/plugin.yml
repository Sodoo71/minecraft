name: MCAdmin
version: "${project.version}"
main: com.mcadmin.MCAdminPlugin
description: Minecraft Admin Dashboard REST API Plugin
api-version: "1.20"
author: MCAdmin Team

commands:
  mcadmin:
    description: MCAdmin plugin commands
    usage: /mcadmin <reload|status>
    permission: mcadmin.admin

permissions:
  mcadmin.admin:
    description: Allows access to MCAdmin admin commands
    default: op
  mcadmin.bypass:
    description: Cannot be kicked or banned via API
    default: op
