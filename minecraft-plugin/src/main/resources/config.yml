# =========================================
# MCAdmin - Minecraft Admin Dashboard Plugin
# Configuration File
# =========================================

# API Server Configuration
api:
  # Port for the REST API server
  # Make sure this port is open in your firewall
  port: 8080

  # API Key for authentication
  # IMPORTANT: Change this to a secure random key!
  # Generate a secure key: https://randomkeygen.com/
  key: "CHANGE_THIS_SECRET_KEY_32_CHARS_LONG_"

  # Enable debug logging for API requests
  debug: false

  # Rate limiting: max requests per minute per IP
  rate-limit: 60

# Logging Configuration
logging:
  # Log admin actions (kick, ban, op) to console
  admin-actions: true

# Security Settings
security:
  # IP whitelist for API access (leave empty to allow all)
  # Example: ["127.0.0.1", "192.168.1.100"]
  ip-whitelist: []

  # Require HTTPS (for reverse proxy setups)
  require-https: false
